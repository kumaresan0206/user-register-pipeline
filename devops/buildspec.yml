version: 0.2

phases:

  install:
    runtime-versions:
      python: 3.13

    commands:
      - echo Installing dependencies...
      - pip install -r layers/common/requirements.txt -t layers/common/python
      - pip install aws-sam-cli
      - which python
      - which pip
      - python --version
      - pip --version

  pre_build:
    commands:
      - echo Running unit tests...
      - export PYTHONPATH=$PYTHONPATH:$(pwd)
      - python -m pytest tests -v

  build:
    commands:
      - echo Building SAM application...
      - sam build -t devops/template.yml

  post_build:
    commands:
      - echo Packaging SAM application...
      - sam package --template-file .aws-sam/build/template.yaml --s3-bucket user-register-pipeline-artifacts-s3  --output-template-file packaged-template.yaml

artifacts:
  files:
    - packaged-template.yaml